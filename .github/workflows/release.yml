name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ライセンスチェックとライセンス文書の生成
  license-check:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v6

      - name: Node.jsセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: ライセンスチェック
        run: npm run license-check

      - name: npm audit（セキュリティ脆弱性チェック）
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: サードパーティライセンス生成
        run: npm run generate-licenses

      - name: ライセンスファイルアップロード
        uses: actions/upload-artifact@v7
        with:
          name: license-files
          path: |
            THIRD-PARTY-LICENSES.txt
            NOTICE

  # マルチプラットフォームビルド
  build:
    needs: license-check
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - runner: macos-15
            artifact-name: build-macos-latest
            build-script: dist:mac
          - runner: windows-2025
            artifact-name: build-windows-latest
            build-script: dist:win
          - runner: ubuntu-latest
            artifact-name: build-ubuntu-latest
            build-script: dist:linux

    steps:
      - name: チェックアウト
        uses: actions/checkout@v6

      - name: Node.jsセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: ライセンスファイルダウンロード
        uses: actions/download-artifact@v8
        with:
          name: license-files

      - name: 依存関係インストール
        run: npm ci

      - name: lockfile 整合性チェック
        shell: bash
        run: |
          if [ ! -f package-lock.json ]; then
            echo "エラー: package-lock.json が存在しません"
            exit 1
          fi
          npm ci --dry-run

      - name: バージョン整合性チェック
        shell: bash
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "タグバージョン: $TAG_VERSION"
          echo "package.jsonバージョン: $PACKAGE_VERSION"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "エラー: タグバージョン($TAG_VERSION)とpackage.jsonのバージョン($PACKAGE_VERSION)が一致しません"
            exit 1
          fi

      - name: Electronビルド
        shell: bash
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: |
          for attempt in 1 2 3; do
            echo "Electronビルド試行 $attempt/3"
            if npm run ${{ matrix.build-script }}; then
              exit 0
            fi

            if [ "$attempt" = "3" ]; then
              echo "Electronビルドが3回失敗しました"
              exit 1
            fi

            sleep $((attempt * 10))
          done

      - name: ビルド成果物アップロード
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            dist/*.zip
            dist/*.AppImage
          if-no-files-found: error

  # GitHubリリース作成
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 全履歴を取得してタグ間の比較を可能にする

      - name: 全ビルド成果物ダウンロード
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: 成果物の確認
        run: |
          echo "アーティファクトの内容:"
          find artifacts -type f

      - name: リリースノート生成
        id: release_notes
        run: |
          # 現在のタグを取得
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          # 前のタグを取得
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -n1)

          # 前のタグが存在しない場合は全履歴から生成
          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "前バージョン: $PREVIOUS_TAG"
          echo "現バージョン: $CURRENT_TAG"

          # リリースノートを生成
          {
            echo "## 📦 配布ファイル"
            echo ""
            echo "- **Windows**: \`Touhou.School.of.Fish-*.zip\` (ZIP形式)"
            echo "- **macOS**: \`Touhou.School.of.Fish-*.zip\` (ARM64/x64ユニバーサルバイナリ)"
            echo "- **Linux**: \`Touhou.School.of.Fish-*.AppImage\` (AppImage形式)"
            echo ""
            echo "## 📝 変更内容"
            echo ""

            # コミットログをカテゴリ別に分類
            git log ${PREVIOUS_TAG}..${CURRENT_TAG} --pretty=format:"%s	%h" > /tmp/raw_commits.txt
            while IFS=$'\t' read -r message hash; do
              # マージコミットをスキップ
              if [[ "$message" =~ ^Merge\ (pull\ request|branch) ]]; then
                continue
              fi

              case "$message" in
                feat:*|feat\(*|feature:*|feature\(*|add:*|add\(*)
                  echo "FEATURE	$message	$hash"
                  ;;
                fix:*|fix\(*)
                  echo "FIX	$message	$hash"
                  ;;
                docs:*|docs\(*|doc:*|doc\(*)
                  echo "DOCS	$message	$hash"
                  ;;
                chore:*|chore\(*)
                  echo "CHORE	$message	$hash"
                  ;;
                perf:*|perf\(*)
                  echo "PERF	$message	$hash"
                  ;;
                refactor:*|refactor\(*)
                  echo "REFACTOR	$message	$hash"
                  ;;
                build:*|build\(*|release:*|release\(*)
                  echo "BUILD	$message	$hash"
                  ;;
                *)
                  echo "OTHER	$message	$hash"
                  ;;
              esac
            done < /tmp/raw_commits.txt > /tmp/commits.txt

            # ✨ 新機能
            if grep -q "^FEATURE" /tmp/commits.txt; then
              echo "### ✨ 新機能"
              echo ""
              grep "^FEATURE" /tmp/commits.txt | while IFS=$'\t' read -r _ message hash; do
                echo "- ${message#*: } ([\`$hash\`](https://github.com/${{ github.repository }}/commit/$hash))"
              done
              echo ""
            fi

            # 🐛 バグ修正
            if grep -q "^FIX" /tmp/commits.txt; then
              echo "### 🐛 バグ修正"
              echo ""
              grep "^FIX" /tmp/commits.txt | while IFS=$'\t' read -r _ message hash; do
                echo "- ${message#*: } ([\`$hash\`](https://github.com/${{ github.repository }}/commit/$hash))"
              done
              echo ""
            fi

            # 📝 ドキュメント
            if grep -q "^DOCS" /tmp/commits.txt; then
              echo "### 📝 ドキュメント"
              echo ""
              grep "^DOCS" /tmp/commits.txt | while IFS=$'\t' read -r _ message hash; do
                echo "- ${message#*: } ([\`$hash\`](https://github.com/${{ github.repository }}/commit/$hash))"
              done
              echo ""
            fi

            # ⚡ パフォーマンス改善
            if grep -q "^PERF" /tmp/commits.txt; then
              echo "### ⚡ パフォーマンス改善"
              echo ""
              grep "^PERF" /tmp/commits.txt | while IFS=$'\t' read -r _ message hash; do
                echo "- ${message#*: } ([\`$hash\`](https://github.com/${{ github.repository }}/commit/$hash))"
              done
              echo ""
            fi

            # 🎨 リファクタリング
            if grep -q "^REFACTOR" /tmp/commits.txt; then
              echo "### 🎨 リファクタリング"
              echo ""
              grep "^REFACTOR" /tmp/commits.txt | while IFS=$'\t' read -r _ message hash; do
                echo "- ${message#*: } ([\`$hash\`](https://github.com/${{ github.repository }}/commit/$hash))"
              done
              echo ""
            fi

            # 🔧 メンテナンス
            if grep -q "^CHORE" /tmp/commits.txt; then
              echo "### 🔧 メンテナンス"
              echo ""
              grep "^CHORE" /tmp/commits.txt | while IFS=$'\t' read -r _ message hash; do
                echo "- ${message#*: } ([\`$hash\`](https://github.com/${{ github.repository }}/commit/$hash))"
              done
              echo ""
            fi

            # 🚀 ビルド・リリース
            if grep -q "^BUILD" /tmp/commits.txt; then
              echo "### 🚀 ビルド・リリース"
              echo ""
              grep "^BUILD" /tmp/commits.txt | while IFS=$'\t' read -r _ message hash; do
                echo "- ${message#*: } ([\`$hash\`](https://github.com/${{ github.repository }}/commit/$hash))"
              done
              echo ""
            fi

            # 🔄 その他の変更
            if grep -q "^OTHER" /tmp/commits.txt; then
              echo "### 🔄 その他の変更"
              echo ""
              grep "^OTHER" /tmp/commits.txt | while IFS=$'\t' read -r _ message hash; do
                echo "- $message ([\`$hash\`](https://github.com/${{ github.repository }}/commit/$hash))"
              done
              echo ""
            fi

            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
          } > /tmp/release_notes.md

          cat /tmp/release_notes.md

      - name: GitHubリリース作成
        uses: ncipollo/release-action@v1
        with:
          bodyFile: /tmp/release_notes.md
          artifacts: |
            artifacts/build-macos-latest/*.zip
            artifacts/build-windows-latest/*.zip
            artifacts/build-ubuntu-latest/*.AppImage
            artifacts/license-files/THIRD-PARTY-LICENSES.txt
            artifacts/license-files/NOTICE
          draft: false
          prerelease: false
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
